<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="mb-4">
        <h2 class="fw-bold mb-1" style="color: #e2e8f0;">✏️ Editar Producto</h2>
        <p style="color: #718096;">Modifica los datos del producto</p>
      </div>

      <div class="card p-4">
        <form [formGroup]="productoForm" (ngSubmit)="guardarCambios()">

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" formControlName="nombre" placeholder="Ej: Laptop HP">
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Categoría</label>
              <select class="form-select" formControlName="categoria_id">
                <option *ngFor="let cat of categorias" [value]="cat.id">
                  {{ cat.nombre }}
                </option>
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" formControlName="descripcion" rows="2"
              placeholder="Descripción del producto"></textarea>
          </div>

          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Precio</label>
              <input type="number" class="form-control" formControlName="precio" placeholder="0.00">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Stock</label>
              <input type="number" class="form-control" formControlName="stock" placeholder="0">
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">URL de Imagen</label>
              <input type="text" class="form-control" formControlName="imagen" placeholder="https://...">
            </div>
          </div>

          <div class="d-flex justify-content-between mt-4">
            <button type="button" class="btn btn-secondary px-4" routerLink="/productos">
              ← Cancelar
            </button>
            <button type="submit" class="btn btn-success px-4" [disabled]="productoForm.invalid">
              💾 Guardar Cambios
            </button>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>
