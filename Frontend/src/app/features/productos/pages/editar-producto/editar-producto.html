<div class="container mt-4">
  <div class="card shadow p-4">

    <h3 class="text-center mb-4">✏️ Editar Producto</h3>

    <form [formGroup]="productoForm" (ngSubmit)="guardarCambios()">

      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" formControlName="nombre">
      </div>

      <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea class="form-control" formControlName="descripcion"></textarea>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Precio</label>
          <input type="number" class="form-control" formControlName="precio">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Stock</label>
          <input type="number" class="form-control" formControlName="stock">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Categoría</label>
        <select class="form-select" formControlName="categoria_id">
          <option *ngFor="let cat of categorias" [value]="cat.id">
            {{ cat.nombre }}
          </option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">URL de Imagen</label>
        <input type="text" class="form-control" formControlName="imagen">
      </div>

      <div class="d-flex justify-content-between mt-4">
        <button type="button" class="btn btn-secondary" routerLink="/productos">
          Cancelar
        </button>
        <button type="submit" class="btn btn-success" [disabled]="productoForm.invalid">
          💾 Guardar
        </button>
      </div>

    </form>
  </div>
</div>
