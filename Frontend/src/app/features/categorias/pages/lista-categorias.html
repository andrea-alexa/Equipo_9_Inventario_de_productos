<div class="container py-5">

  <div class="mb-5">
    <h2 class="fw-bold mb-1 d-flex align-items-center gap-2" style="color: #e2e8f0;">
      <i class="bi bi-tags"></i>
      Gestión de Categorías
    </h2>
    <p style="color: #718096;">Crea, edita y elimina categorías de productos</p>
  </div>

  <!-- FORMULARIO AGREGAR -->
  <div class="card p-4 mb-5">
    <h5 class="fw-semibold mb-4" style="color: #e2e8f0;">Agregar Categoría</h5>
    <div class="d-flex gap-3">
      <input
        type="text"
        class="form-control"
        [(ngModel)]="nuevoNombre"
        placeholder="Ej: Electrónica, Ropa, Herramientas..."
        (keyup.enter)="agregarCategoria()">
      <button class="btn btn-primary px-4 d-flex align-items-center gap-2" style="white-space: nowrap;" (click)="agregarCategoria()">
        <i class="bi bi-plus-circle"></i> Agregar
      </button>
    </div>
  </div>

  <!-- LISTA -->
  <h5 class="fw-semibold mb-4" style="color: #e2e8f0;">Categorías registradas</h5>

  <div class="row">
    <div *ngFor="let cat of categorias" class="col-md-4 col-lg-3 mb-3">
      <div class="card p-3 h-100">

        <!-- MODO NORMAL -->
        <div *ngIf="editandoId !== cat.id" class="d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center gap-2">
            <i class="bi bi-tag" style="color: #6366f1; font-size: 1.25rem;"></i>
            <span class="fw-semibold" style="color: #e2e8f0;">{{ cat.nombre }}</span>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-warning btn-sm d-flex align-items-center" (click)="iniciarEdicion(cat)" title="Editar">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-danger btn-sm d-flex align-items-center" (click)="eliminarCategoria(cat.id)" title="Eliminar">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>

        <!-- MODO EDICIÓN -->
        <div *ngIf="editandoId === cat.id">
          <input
            type="text"
            class="form-control mb-2"
            [(ngModel)]="editandoNombre"
            (keyup.enter)="guardarEdicion(cat.id)"
            (keyup.escape)="cancelarEdicion()">
          <div class="d-flex gap-2">
            <button class="btn btn-success btn-sm flex-fill d-flex align-items-center justify-content-center gap-1" (click)="guardarEdicion(cat.id)">
              <i class="bi bi-check-lg"></i> Guardar
            </button>
            <button class="btn btn-secondary btn-sm flex-fill d-flex align-items-center justify-content-center gap-1" (click)="cancelarEdicion()">
              <i class="bi bi-x-lg"></i> Cancelar
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- VACÍO -->
  <div *ngIf="categorias.length === 0"
    class="d-flex flex-column justify-content-center align-items-center mt-5" style="min-height: 200px;">
    <div style="font-size: 3rem; color: #6366f1;"><i class="bi bi-tags"></i></div>
    <h5 class="mt-3" style="color: #718096;">Sin categorías</h5>
    <p style="color: #4a5568;">Agrega tu primera categoría usando el formulario de arriba</p>
  </div>

</div>
