<div class="contenedor">
  <h2>Listado de Productos</h2>

  <div style="margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px;">
    <h3>Agregar Nuevo Producto</h3>
    
    <input 
      type="text" 
      placeholder="Ej: Monitor 24 pulgadas" 
      [(ngModel)]="nuevoNombre"
      style="margin-right: 10px; padding: 5px;"
    >
    
    <input 
      type="number" 
      placeholder="Precio" 
      [(ngModel)]="nuevoPrecio"
      style="margin-right: 10px; padding: 5px;"
    >
    
    <button (click)="agregarProducto()" style="padding: 5px 15px; cursor: pointer;">
      Agregar
    </button>
  </div>

  <ul>
    @for (producto of productos; track producto.id) {
      <li>
        <strong>{{ producto.nombre }}</strong> - ${{ producto.precio }}
      </li>
    } @empty {
      <div style="color: red; margin-top: 10px;">
        ⚠️ Advertencia: Actualmente no hay productos registrados en el inventario.
      </div>
    }
  </ul>
</div>
